<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1100" height="880" fill="#f4f5f7"/>
  <text x="40" y="58" font-size="30" font-weight="800" fill="#1b2230">Arbiter — brand system</text>
  <text x="40" y="86" font-size="15" fill="#5b6573">imaging-governance · the deterministic judge over probabilistic model output</text>
  <line x1="40" y1="104" x2="1060" y2="104" stroke="#e2e5ea" stroke-width="2"/>

  <!-- primary mark on light -->
  <text x="40" y="146" font-size="13" font-weight="700" letter-spacing="2" fill="#8a93a3">PRIMARY MARK</text>
  <rect x="40" y="158" width="240" height="200" rx="14" fill="#fff" stroke="#e2e5ea"/>
  <g transform="translate(100,178) scale(1.33)">
    <g stroke-linecap="round" stroke-linejoin="round">
      <line x1="28" y1="105" x2="88" y2="105" stroke="#1b2230" stroke-width="15"/>
      <line x1="64" y1="52" x2="97" y2="90" stroke="#d6602e" stroke-width="15"/>
      <rect x="23" y="29" width="56" height="25" rx="9" fill="#1b2230" transform="rotate(-42 51 41)"/>
    </g>
  </g>

  <!-- mark on dark -->
  <text x="300" y="146" font-size="13" font-weight="700" letter-spacing="2" fill="#8a93a3">ON DARK</text>
  <rect x="300" y="158" width="240" height="200" rx="14" fill="#11161f"/>
  <g transform="translate(360,178) scale(1.33)">
    <g stroke-linecap="round" stroke-linejoin="round">
      <line x1="28" y1="105" x2="88" y2="105" stroke="#ffffff" stroke-width="15"/>
      <line x1="64" y1="52" x2="97" y2="90" stroke="#d6602e" stroke-width="15"/>
      <rect x="23" y="29" width="56" height="25" rx="9" fill="#ffffff" transform="rotate(-42 51 41)"/>
    </g>
  </g>

  <!-- avatar / favicon sizes -->
  <text x="560" y="146" font-size="13" font-weight="700" letter-spacing="2" fill="#8a93a3">AVATAR / FAVICON</text>
  <rect x="560" y="158" width="500" height="200" rx="14" fill="#fff" stroke="#e2e5ea"/>
  <g transform="translate(596,196)">
    <!-- 96 -->
    <g><rect width="96" height="96" rx="21" fill="#1b2230"/>
      <g transform="scale(0.8)" stroke-linecap="round" stroke-linejoin="round">
        <line x1="30" y1="103" x2="86" y2="103" stroke="#fff" stroke-width="14"/>
        <line x1="64" y1="52" x2="95" y2="88" stroke="#d6602e" stroke-width="14"/>
        <rect x="25" y="31" width="52" height="24" rx="8" fill="#fff" transform="rotate(-42 51 43)"/></g>
      <text x="48" y="116" font-size="11" fill="#8a93a3" text-anchor="middle">96</text></g>
    <!-- 48 -->
    <g transform="translate(130,24)"><rect width="48" height="48" rx="11" fill="#1b2230"/>
      <g transform="scale(0.4)" stroke-linecap="round" stroke-linejoin="round">
        <line x1="30" y1="103" x2="86" y2="103" stroke="#fff" stroke-width="14"/>
        <line x1="64" y1="52" x2="95" y2="88" stroke="#d6602e" stroke-width="14"/>
        <rect x="25" y="31" width="52" height="24" rx="8" fill="#fff" transform="rotate(-42 51 43)"/></g>
      <text x="24" y="68" font-size="11" fill="#8a93a3" text-anchor="middle">48</text></g>
    <!-- 32 -->
    <g transform="translate(210,40)"><rect width="32" height="32" rx="7" fill="#1b2230"/>
      <g transform="scale(0.267)" stroke-linecap="round" stroke-linejoin="round">
        <line x1="30" y1="103" x2="86" y2="103" stroke="#fff" stroke-width="16"/>
        <line x1="64" y1="52" x2="95" y2="88" stroke="#d6602e" stroke-width="16"/>
        <rect x="25" y="31" width="52" height="24" rx="8" fill="#fff" transform="rotate(-42 51 43)"/></g>
      <text x="16" y="52" font-size="11" fill="#8a93a3" text-anchor="middle">32</text></g>
    <!-- 16 -->
    <g transform="translate(272,48)"><rect width="16" height="16" rx="4" fill="#1b2230"/>
      <g transform="scale(0.133)" stroke-linecap="round" stroke-linejoin="round">
        <line x1="30" y1="103" x2="86" y2="103" stroke="#fff" stroke-width="20"/>
        <line x1="64" y1="52" x2="95" y2="88" stroke="#d6602e" stroke-width="20"/>
        <rect x="25" y="31" width="52" height="24" rx="8" fill="#fff" transform="rotate(-42 51 43)"/></g>
      <text x="8" y="36" font-size="11" fill="#8a93a3" text-anchor="middle">16</text></g>
  </g>

  <!-- light lockup -->
  <text x="40" y="404" font-size="13" font-weight="700" letter-spacing="2" fill="#8a93a3">HORIZONTAL LOCKUP</text>
  <rect x="40" y="416" width="1020" height="150" rx="14" fill="#fff" stroke="#e2e5ea"/>
  <g transform="translate(60,425) scale(0.78)">
    <g transform="translate(0,0)"><rect width="120" height="120" rx="26" fill="#1b2230"/>
      <g stroke-linecap="round" stroke-linejoin="round">
        <line x1="30" y1="103" x2="86" y2="103" stroke="#fff" stroke-width="14"/>
        <line x1="64" y1="52" x2="95" y2="88" stroke="#d6602e" stroke-width="14"/>
        <rect x="25" y="31" width="52" height="24" rx="8" fill="#fff" transform="rotate(-42 51 43)"/></g></g>
    <text x="160" y="46" font-size="15" font-weight="700" letter-spacing="3" fill="#11868a">THE ARBITER</text>
    <text x="160" y="92" font-size="44" font-weight="800" fill="#1b2230">imaging-<tspan fill="#d6602e">governance</tspan></text>
    <text x="160" y="122" font-size="17" fill="#5b6573">model proposes · deterministic engine disposes</text>
  </g>

  <!-- dark lockup -->
  <rect x="40" y="586" width="1020" height="150" rx="14" fill="#11161f"/>
  <g transform="translate(60,595) scale(0.78)">
    <g transform="translate(0,0)"><rect width="120" height="120" rx="26" fill="#1b2230" stroke="#2c3647" stroke-width="2"/>
      <g stroke-linecap="round" stroke-linejoin="round">
        <line x1="30" y1="103" x2="86" y2="103" stroke="#fff" stroke-width="14"/>
        <line x1="64" y1="52" x2="95" y2="88" stroke="#d6602e" stroke-width="14"/>
        <rect x="25" y="31" width="52" height="24" rx="8" fill="#fff" transform="rotate(-42 51 43)"/></g></g>
    <text x="160" y="46" font-size="15" font-weight="700" letter-spacing="3" fill="#3bb6ba">THE ARBITER</text>
    <text x="160" y="92" font-size="44" font-weight="800" fill="#f4f5f7">imaging-<tspan fill="#e8743f">governance</tspan></text>
    <text x="160" y="122" font-size="17" fill="#9aa3b2">model proposes · deterministic engine disposes</text>
  </g>

  <!-- palette -->
  <text x="40" y="784" font-size="13" font-weight="700" letter-spacing="2" fill="#8a93a3">PALETTE</text>
  <g transform="translate(40,798)" font-size="12">
    <g><rect width="150" height="54" rx="8" fill="#1b2230"/><text x="12" y="32" fill="#fff" font-weight="700">Ink</text><text x="12" y="48" fill="#aab2c0">#1b2230</text></g>
    <g transform="translate(166,0)"><rect width="150" height="54" rx="8" fill="#d6602e"/><text x="12" y="32" fill="#fff" font-weight="700">Rust</text><text x="12" y="48" fill="#ffe3d4">#d6602e</text></g>
    <g transform="translate(332,0)"><rect width="150" height="54" rx="8" fill="#11868a"/><text x="12" y="32" fill="#fff" font-weight="700">Teal</text><text x="12" y="48" fill="#cfeceb">#11868a</text></g>
    <g transform="translate(498,0)"><rect width="150" height="54" rx="8" fill="#21a366"/><text x="12" y="32" fill="#fff" font-weight="700">Pass</text><text x="12" y="48" fill="#d3f0e0">#21a366</text></g>
    <g transform="translate(664,0)"><rect width="150" height="54" rx="8" fill="#e0a200"/><text x="12" y="32" fill="#fff" font-weight="700">Warn</text><text x="12" y="48" fill="#fff0cc">#e0a200</text></g>
    <g transform="translate(830,0)"><rect width="150" height="54" rx="8" fill="#db4d36"/><text x="12" y="32" fill="#fff" font-weight="700">Fail</text><text x="12" y="48" fill="#ffd8d1">#db4d36</text></g>
  </g>
</svg>
